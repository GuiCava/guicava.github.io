    <style>
      #wp-extension {
        display: none;
      }

      #root {
        cursor: url('https://www.rw-designer.com/cursor-view/10017.png'), auto;
      }

      a, button {
        cursor: url('https://www.rw-designer.com/cursor-view/22111.png'), pointer;
      }

      textarea, input, .editable {
        cursor: url('https://www.rw-designer.com/cursor-view/10018.png'), text;
      }

      @font-face {
        font-family: 'header';
        src: url("./fonts/Jersey15-Regular.ttf") format("truetype");
      }

      @font-face {
        font-family: 'pixel';
        src: url("./fonts/PixelifySans-VariableFont_wght.ttf");
      }

      @font-face {
        font-family: 'command';
        src: url("./fonts/consolas.ttf");
      }

      @keyframes subir {
        0% {
          transform: translateY(0);
        }
        25% {
          transform: translateY(-7px);
        }
        75% {
          transform: translateY(7px);
        }
        100% {
          transform: translateY(0);
        }
      }

      .animate-subir {
        animation: subir 7s ease-in-out infinite;
      }

      summary::marker {
        content: "";
      }

      @keyframes cursor {
        0%, 100% {
          border-color: transparent;
        }
        50% {
          border-color: white;
        }
      }

      .animate-cursor {
        border-right: 4px solid white;
        animation: cursor 1.5s infinite;
      }

      @keyframes blinkCursor {
        50% {
          border-right-color: transparent;
        }
      }

      .animate-blinkCursor {
        border-right: 0.2em solid #008000;
        animation:
          typeAndDelete 4s steps(11) infinite,
          blinkCursor 0.5s step-end infinite alternate;
      }

      .sobre {
        font-family: 'Courier New', Courier, monospace;
      }

      html {
        scroll-behavior: smooth;
      }
